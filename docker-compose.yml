version: '3.9'

services:

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  order-service:
    build:
      context: .
      dockerfile: OrderModule/Dockerfile
    container_name: order-module
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq

  inventory-service:
    build:
      context: .
      dockerfile: InventoryModule/Dockerfile
    depends_on:
      rabbitmq:
         condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: PaymentModule/Dockerfile
    depends_on:
      rabbitmq:
         condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: NotificationModule/Dockerfile
    depends_on:
      rabbitmq:
         condition: service_healthy

  benchmark-service:
    build:
      context: .
      dockerfile: BenchmarkModule/Dockerfile
    depends_on:
      rabbitmq:
         condition: service_healthy